name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ISO (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [min, xfce]

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.variant }} ISO
        run: make ${{ matrix.variant == 'min' && 'minimal' || 'xfce' }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename ISO
        run: |
          mv files-${{ matrix.variant }}/custom-debian.iso \
             shamir-manage-${{ matrix.variant }}-${{ steps.version.outputs.version }}.iso

      - uses: actions/upload-artifact@v4
        with:
          name: shamir-manage-${{ matrix.variant }}
          path: shamir-manage-${{ matrix.variant }}-*.iso

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: artifacts/**/*.iso
